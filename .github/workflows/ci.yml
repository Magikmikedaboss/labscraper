name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-lock.txt
        pip install ruff bandit safety
    
    - name: Lint with ruff
      run: ruff check .
    
    - name: Security check
      run: |
        set +e
        bandit -r utils/ tools/ -ll -f json -o bandit-report.json
        bandit_exit=$?
        safety check --output json > safety-report.json
        safety_exit=$?
        set -e
        if [ $bandit_exit -ne 0 ]; then
          echo "::warning file=bandit-report.json::Bandit found security issues. See bandit-report.json."
        fi
        if [ $safety_exit -ne 0 ]; then
          echo "::warning file=safety-report.json::Safety found insecure packages. See safety-report.json."
        fi
        if [ $bandit_exit -ne 0 ] || [ $safety_exit -ne 0 ]; then
          exit 1
        fi
    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json    
    
    - name: Run tests and check coverage
      run: |
        # TODO(2026-09-30): Raise coverage gate back to >=70 after ongoing test expansion lands.
        pytest tests/ -v --cov=utils --cov=tools --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=50
