name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov ruff bandit safety
    
    - name: Lint with ruff
      run: ruff check .
    
    - name: Security check
      run: |
        bandit -r utils/ tools/ -ll || true
        safety check --json || true
    
    - name: Initialize test database
      run: |
        python utils/init_test_db.py test.db
    
    - name: Run tests and check coverage
      run: |
        pytest tests/ -v --cov=utils --cov=tools --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=70
