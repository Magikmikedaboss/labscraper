name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-lock.txt
        pip install ruff bandit safety==3.8.1
    
    - name: Lint with ruff
      run: ruff check .
    
    - name: Security check
      run: |
        chmod +x run_security_checks.sh
        bash ./run_security_checks.sh
    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: security-reports
        path: |
          bandit-report*.json
          safety-report.json    
          safety-report.stderr
    
    - name: Run tests and check coverage
      run: |
        pytest tests/ -v --cov=utils --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=70
