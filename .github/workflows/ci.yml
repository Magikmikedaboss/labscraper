name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-lock.txt
        pip install ruff bandit safety==3.*
    
    - name: Lint with ruff
      run: ruff check .
    
    - name: Security check
      run: |
        set +e
        bandit -l -f json -o bandit-report.json -x "utils/test_*.py,tools/demo_*.py,utils/reporting_utils.py,utils/run_multi_folder_scrape.py,utils/export/reporting.py,utils/scrape_pdfs_parallel.py" $(find utils tools -name '*.py' -print)
        bandit_exit=$?
        safety scan --target . --output json > safety-report.json 2>&1
        safety_exit=$?
        set -e
        if [ $bandit_exit -ne 0 ]; then
          echo "::warning file=bandit-report.json::Bandit found security issues. See bandit-report.json."
        fi
        if [ $safety_exit -ne 0 ]; then
          echo "::warning file=safety-report.json::Safety found insecure packages. See safety-report.json."
        fi
        if [ $bandit_exit -ne 0 ] || [ $safety_exit -ne 0 ]; then
          exit 1
        fi
    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json    
    
    - name: Run tests and check coverage
      run: |
        pytest tests/ -v --cov=utils --cov=tools --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=70
